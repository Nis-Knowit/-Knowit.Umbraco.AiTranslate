name: Release to NuGet

# Publishes the package to NuGet.org when you push a version tag (e.g. v1.0.0)
# or trigger the workflow manually. The package version comes from the tag.
#
# Setup (once): add a repository secret named NUGET_API_KEY
#   GitHub → Settings → Secrets and variables → Actions → New repository secret
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Package version (e.g. 1.0.0)'
        required: true

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Pack
        run: dotnet pack Knowit.Umbraco.AiTranslate.csproj -c Release -p:Version=${{ steps.version.outputs.value }} -o ./artifacts

      - name: Push to NuGet
        run: dotnet nuget push "./artifacts/*.nupkg" --api-key "${{ secrets.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate
