name: Release to NuGet

# Publishes to NuGet.org via Trusted Publishing (OIDC — no stored API key) when
# you push a version tag (e.g. v1.0.0) or trigger the workflow manually.
#
# Setup (once), on nuget.org → Account → Trusted Publishing, add a policy:
#   - Package owner: <your nuget.org account>
#   - Repository owner: Nis-Knowit
#   - Repository:       -Knowit.Umbraco.AiTranslate
#   - Workflow file:    release.yml
# Then add a repository variable NUGET_USER (your nuget.org username):
#   GitHub → Settings → Secrets and variables → Actions → Variables → New variable
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Package version (e.g. 1.0.0)'
        required: true

permissions:
  id-token: write   # required for Trusted Publishing (OIDC token issuance)
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Pack
        run: dotnet pack Knowit.Umbraco.AiTranslate.csproj -c Release -p:Version=${{ steps.version.outputs.value }} -o ./artifacts

      - name: NuGet login (Trusted Publishing → short-lived key)
        id: login
        uses: NuGet/login@v1
        with:
          user: ${{ vars.NUGET_USER }}

      - name: Push to NuGet
        run: dotnet nuget push "./artifacts/*.nupkg" --api-key "${{ steps.login.outputs.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate
